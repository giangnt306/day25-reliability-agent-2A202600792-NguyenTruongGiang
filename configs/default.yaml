providers:
  - name: primary
    fail_rate: 0.25
    base_latency_ms: 180
    cost_per_1k_tokens: 0.01
  - name: backup
    fail_rate: 0.05
    base_latency_ms: 260
    cost_per_1k_tokens: 0.006
circuit_breaker:
  failure_threshold: 3
  reset_timeout_seconds: 2
  success_threshold: 1
cache:
  enabled: true
  backend: memory          # "memory" (default) or "redis" (requires docker compose up -d)
  ttl_seconds: 300
  similarity_threshold: 0.92
  redis_url: "redis://localhost:6379/0"
load_test:
  requests: 100

# Chaos scenarios: each overrides provider fail_rate for targeted testing.
# Injected failure modes exercise a different reliability guarantee each.
scenarios:
  - name: primary_timeout_100
    description: "Primary fails 100% — circuit opens, all traffic fails over to backup"
    provider_overrides:
      primary: 1.0
      backup: 0.0
  - name: primary_flaky_50
    description: "Primary fails 50% — circuit oscillates, mix of primary + fallback"
    provider_overrides:
      primary: 0.5
      backup: 0.0
  - name: all_healthy
    description: "Baseline — both providers healthy, no circuit trips"
    provider_overrides:
      primary: 0.0
      backup: 0.0
  - name: total_outage
    description: "Both providers down — static fallback must keep gateway responsive"
    provider_overrides:
      primary: 1.0
      backup: 1.0
